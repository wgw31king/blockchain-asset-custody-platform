spring:
  datasource:
    url: jdbc:mysql://${BACP_MYSQL_HOST}:${BACP_MYSQL_PORT:3306}/${BACP_MYSQL_DB:bacp}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=true&allowPublicKeyRetrieval=true
    username: ${BACP_MYSQL_USER}
    password: ${BACP_MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${BACP_REDIS_HOST}
      port: ${BACP_REDIS_PORT:6379}
      password: ${BACP_REDIS_PASSWORD}
      database: ${BACP_REDIS_DB:0}
      timeout: 5s
  rabbitmq:
    host: ${BACP_RMQ_HOST}
    port: ${BACP_RMQ_PORT:5672}
    username: ${BACP_RMQ_USER}
    password: ${BACP_RMQ_PASSWORD}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 50
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  # Lower sampling in production to control overhead; raise temporarily when debugging.
  tracing:
    enabled: true
    sampling:
      probability: 0.1

logging:
  level:
    root: WARN
    io.github.wahhh.bacp: INFO
