# Prometheus scrape config for BACP (Spring Boot Actuator).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: bacp
    metrics_path: /actuator/prometheus
    honor_timestamps: true
    static_configs:
      - targets:
          - bacp:8080
