# Recording & alerting rules for BACP JVM, HTTP, and custom counters.
# Tune thresholds for your SLOs; some expressions are defensive placeholders.

groups:
  - name: bacp-jvm
    rules:
      - alert: BacpJvmHeapUsageHigh
        expr: |
          (
            sum without (id) (jvm_memory_used_bytes{area="heap"})
            /
            clamp_min(
              sum without (id) (
                (jvm_memory_max_bytes{area="heap"} > bool 0) * jvm_memory_max_bytes{area="heap"}
              ),
              1
            )
          ) > 0.88
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BACP JVM heap usage high ({{ $labels.instance }})"
          description: "Aggregate heap used / max (pools with max>0 only) exceeded 88% for 5m."

      - alert: BacpJvmGcPauseElevated
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) > 0.25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BACP GC pause time elevated"
          description: "GC pause seconds per second > 0.25 over 5m (tune for your workload)."

      - alert: BacpJvmNonHeapGrowing
        expr: |
          rate(jvm_memory_used_bytes{area="nonheap"}[15m]) > 1048576
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "BACP non-heap memory rising steadily"
          description: "Non-heap used increasing > 1MiB/s over 15m — investigate metaspace / class loaders."

  - name: bacp-http
    rules:
      - alert: BacpHttp5xxRate
        expr: |
          sum by (application, instance, uri, method) (
            rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "BACP HTTP 5xx rate high"
          description: "More than 0.1 req/s with 5xx on {{ $labels.method }} {{ $labels.uri }}."

      - alert: BacpHttpLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, uri, method, application) (
              rate(http_server_requests_seconds_bucket{status!~"5.."}[5m])
            )
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "BACP HTTP p95 latency high"
          description: "p95 > 2s for {{ $labels.method }} {{ $labels.uri }} (successful responses)."

  - name: bacp-business-metrics
    rules:
      # Optional custom counter — exists in GlobalExceptionHandler as bacp_api_errors_total
      - alert: BacpApiErrorsBurst
        expr: |
          increase(bacp_api_errors_total[10m]) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BACP API error counter burst"
          description: "bacp_api_errors_total increased by >50 in 10m — verify upstream / validation."

      # Placeholder: define bacp_api_errors_total_alternative using HTTP 4xx/5xx if custom metric absent
      - alert: BacpHttpClientOrServerErrorsRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"4..|5.."}[5m])) by (application, instance) > 5
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "BACP elevated HTTP 4xx/5xx throughput"
          description: "Aggregate client/server error rate > 5 rps — correlate with logs."

  # Connection pool pressure — requires Spring Boot Hikari metrics (management.metrics.enable.hikaricp).
  - name: bacp-datasource
    rules:
      - alert: BacpHikariPendingConnections
        expr: |
          sum by (application, pool) (hikaricp_connections_pending) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "BACP Hikari pending connections ({{ $labels.pool }})"
          description: "Threads waiting for a connection >0 for 5m — increase pool size or reduce hold time."

      - alert: BacpHikariConnectionTimeouts
        expr: |
          increase(hikaricp_connections_timeout_total[10m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "BACP Hikari connection acquire timeouts"
          description: "Pool exhausted or DB unreachable — check RDS load and leak suspects."

  # MyBatis SqlMetricsInterceptor — tune threshold vs bacp.metrics.sql-slow-threshold-ms.
  - name: bacp-sql
    rules:
      - alert: BacpSqlSlowBurst
        expr: |
          sum(rate(bacp_sql_slow_total[5m])) by (application) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "BACP slow SQL statements elevated"
          description: "More than 0.5 slow mapper calls/s (bacp_sql_slow_total) — inspect mapper_id labels."

  # On-chain deposit confirmation timer (single-notify deposits may register near-zero latency).
  - name: bacp-onchain
    rules:
      - alert: BacpDepositConfirmationLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, chain) (
              rate(bacp_onchain_deposit_confirmation_seconds_bucket[15m])
            )
          ) > 600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "BACP deposit confirmation latency p95 high ({{ $labels.chain }})"
          description: "p95 > 600s — RPC/indexer lag or custody webhook delays."

  # bacp_disk_free_bytes — custom gauge; -1 means poll failure.
  - name: bacp-host
    rules:
      - alert: BacpDiskFreeLow
        expr: |
          bacp_disk_free_bytes > 0 and bacp_disk_free_bytes < 1073741824
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "BACP disk free space low ({{ $labels.path }})"
          description: "Usable space under 1GiB — rotate logs or expand volume."

      - alert: BacpDiskMetricsBroken
        expr: |
          bacp_disk_free_bytes == -1
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "BACP disk gauge unreadable"
          description: "bacp_disk_free_bytes stuck at -1 — path permission or FileStore error."
