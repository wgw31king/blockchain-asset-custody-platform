name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven verify
        run: mvn -B verify

      - name: Upload JaCoCo gate report (CI threshold bundle)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-gate
          path: target/site/jacoco-gate/

      - name: Upload JaCoCo full report (baseline excludes only)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-full
          path: target/site/jacoco-full/
