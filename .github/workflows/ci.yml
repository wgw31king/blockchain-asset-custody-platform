name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Includes @Tag("docker") / Testcontainers; requires GitHub-hosted Docker (API ≥ 1.40). Local: Docker 29.4.3+ recommended.
      - name: Maven verify
        run: mvn -B verify -Dsurefire.excludedGroups=

      - name: Upload static analysis reports (Checkstyle / PMD / SpotBugs)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: static-analysis-reports
          path: |
            target/checkstyle-result.xml
            target/pmd.xml
            target/spotbugsXml.xml

      - name: Upload JaCoCo gate report (CI threshold bundle)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-gate
          path: target/site/jacoco-gate/

      - name: Upload JaCoCo full report (baseline excludes only)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report-full
          path: target/site/jacoco-full/

      - name: Upload Surefire reports and per-test output logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-and-logs
          path: target/surefire-reports/
